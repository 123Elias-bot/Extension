<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Roblox Booster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            min-height: 500px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Header con efecto glassmorphism */
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.3) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            box-shadow: 0 8px 32px rgba(233, 69, 96, 0.4);
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        /* Stats Cards */
        .stats-container {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-top: 4px;
        }

        /* Botones */
        .buttons-container {
            padding: 0 15px 15px;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #00d9ff, #00a8e8);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffd93d, #ff6b35);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 217, 61, 0.3);
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 217, 61, 0.4);
        }

        /* Log/Status */
        .status-container {
            margin: 0 15px 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 3px solid #e94560;
        }

        .status-header {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #log {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
            max-height: 100px;
            overflow-y: auto;
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* Footer */
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎮</div>
        <h2>Roblox Booster</h2>
        <div class="subtitle">Optimización de rendimiento</div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon">💻</div>
            <div class="stat-label">Sistema</div>
            <div class="stat-value" id="osInfo">Detectando...</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-label">Estado</div>
            <div class="stat-value" style="color: #00ff88;">Activo</div>
        </div>
    </div>

    <div class="buttons-container">
        <button class="btn btn-primary" id="checkSystem">
            <span>🔍</span> Analizar Sistema
        </button>
        <button class="btn btn-success" id="openGameMode">
            <span>🚀</span> Activar Game Mode
        </button>
        <button class="btn btn-secondary" id="openGraphics">
            <span>🎨</span> Optimizar Gráficos (HAGS)
        </button>
        <button class="btn btn-secondary" id="openPower">
            <span>🔋</span> Configurar Energía
        </button>
        <button class="btn btn-warning" id="drivers">
            <span>🔄</span> Actualizar Drivers GPU
        </button>
    </div>

    <div class="status-container">
        <div class="status-header">
            <span class="status-dot"></span>
            Registro de Actividad
        </div>
        <div id="log">Esperando acción...</div>
    </div>

    <div class="footer">
        v1.0 • Optimizado para Roblox
    </div>

    <script src="popup.js"></script>
</body>
</html>
